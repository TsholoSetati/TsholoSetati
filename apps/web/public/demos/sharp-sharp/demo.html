<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#047857" />
    <title>Sharp-Sharp · Shared expense tracker</title>
    <meta
      name="description"
      content="Split bills, track expenses, and settle up with the minimum number of payments. Offline-first PWA. Runs in your browser."
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="icon-192.svg" />
    <script>
      // Theme handoff before paint to avoid FOUC
      (function () {
        try {
          var p = new URLSearchParams(location.search);
          var t = p.get('theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/demos/sharp-sharp/assets/app-B_O_E6to.js"></script>
    <link rel="stylesheet" crossorigin href="/demos/sharp-sharp/assets/app-DGe1eQnf.css">
  <link rel="manifest" href="/demos/sharp-sharp/manifest.webmanifest"></head>
  <body>
    <div id="app"></div>
  </body>
</html>
