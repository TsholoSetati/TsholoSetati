name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/web/demos-src/sharp-sharp/package-lock.json
            apps/web/demos-src/policy-prism/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Install demo (sharp-sharp) dependencies
        run: npm install --no-audit --no-fund --prefer-offline
        working-directory: apps/web/demos-src/sharp-sharp

      - name: Install demo (policy-prism) dependencies
        run: npm install --no-audit --no-fund --prefer-offline
        working-directory: apps/web/demos-src/policy-prism

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production
