name: Fetch market data

on:
  schedule:
    # Weekdays (Mon–Fri) every 30 minutes during a wide market window (06:00–22:00 UTC).
    - cron: '*/30 6-22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch quotes from Yahoo Finance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/web/public/data
          out=apps/web/public/data/markets.json
          tmp=$(mktemp)

          declare -A LABELS=(
            ["%5EGSPC"]="S&P 500"
            ["%5EIXIC"]="NASDAQ"
            ["%5EJ203.JO"]="JSE Top 40"
            ["CL%3DF"]="WTI Crude"
            ["HG%3DF"]="Copper"
            ["USDZAR%3DX"]="USD/ZAR"
          )
          ORDER=("%5EGSPC" "%5EIXIC" "%5EJ203.JO" "CL%3DF" "HG%3DF" "USDZAR%3DX")

          echo '{ "updated": "'"$(date -u +%FT%TZ)"'", "quotes": [' > "$tmp"
          first=1
          for sym in "${ORDER[@]}"; do
            label="${LABELS[$sym]}"
            url="https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d"
            resp=$(curl -fsSL -A 'Mozilla/5.0 (compatible; tsholosetati-bot/1.0)' "$url" || echo '{}')
            price=$(echo "$resp" | jq -r '.chart.result[0].meta.regularMarketPrice // empty')
            prev=$(echo "$resp" | jq -r '.chart.result[0].meta.chartPreviousClose // empty')
            if [[ -z "$price" || -z "$prev" || "$prev" == "0" ]]; then
              continue
            fi
            change=$(awk "BEGIN { printf \"%.2f\", (($price-$prev)/$prev)*100 }")
            sym_clean=$(printf '%b' "${sym//%/\\x}")
            [[ $first -eq 1 ]] || echo ',' >> "$tmp"
            first=0
            printf '  { "symbol": "%s", "label": "%s", "price": %s, "changePct": %s }' \
              "$sym_clean" "$label" "$price" "$change" >> "$tmp"
          done
          echo '' >> "$tmp"
          echo ']}' >> "$tmp"
          mv "$tmp" "$out"
          cat "$out"

      - name: Commit changes
        run: |
          if git diff --quiet -- apps/web/public/data/markets.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/data/markets.json
          git commit -m "chore(data): refresh market quotes"
          git push
