name: Fetch market data

# Yahoo Finance (with Stooq lite fallback) — refreshed 4x daily during the SAST workday.
# 09:00, 12:00, 15:00, 18:00 SAST = 07:00, 10:00, 13:00, 16:00 UTC.
on:
  schedule:
    - cron: '0 7,10,13,16 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-markets
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch quotes (Yahoo → Stooq fallback)
        run: node apps/web/scripts/fetch-markets.mjs

      - name: Show output
        run: head -c 2000 apps/web/public/data/markets.json && echo

      - name: Commit changes
        run: |
          if git diff --quiet -- apps/web/public/data/markets.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/data/markets.json
          git commit -m "chore(data): refresh market quotes"
          git push
